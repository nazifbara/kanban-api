services:
  postgres_db:
    image: postgres:16-alpine
    container_name: go_postgres_db
    environment:
      POSTGRES_USER: testuser
      POSTGRES_PASSWORD: testpassword
      POSTGRES_DB: kanban-db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U testuser -d kanban-db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: